<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CasinoTopFinder24</title>

<meta name="description" content="Vergleiche internationale Online Casinos nach Bonus, Auszahlung und Bewertung." />

<style>

:root {
--bg:#f8fafc;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--border:#e2e8f0;
--dark:#0f172a;
--shadow:0 10px 30px rgba(15,23,42,0.08);
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
background:var(--bg);
color:var(--text);
}

.container{
width:min(1120px,calc(100% - 32px));
margin:0 auto;
}

.hero{
padding:60px 0;
text-align:center;
}

.cards{
display:grid;
gap:24px;
}

.card{
background:white;
border:1px solid var(--border);
border-radius:24px;
padding:30px;
display:grid;
grid-template-columns:1fr auto;
align-items:center;
box-shadow:var(--shadow);
}

.brand{
display:flex;
gap:20px;
align-items:center;
}

.logo-box{
width:70px;
height:70px;
border-radius:16px;
border:1px solid var(--border);
display:flex;
align-items:center;
justify-content:center;
background:white;
}

.logo-box img{
width:90%;
}

.casino-name{
font-size:1.6rem;
font-weight:700;
}

.btn{
background:#0f172a;
color:white;
padding:14px 20px;
border-radius:14px;
font-weight:700;
text-decoration:none;
}

.btn:hover{
opacity:0.9;
}

</style>
</head>

<body>

<section class="hero">
<div class="container">
<h1>Online Casino Vergleich 2026</h1>
<p>Vergleiche internationale Online Casinos</p>
</div>
</section>

<section>
<div class="container">
<div class="cards" id="cards"></div>
</div>
</section>

<script>

{

name:"Wildz",
logo:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Wildz_logo.png",
bonus:"Bonus bis 500€",
link:"#"

{
name:"Spinz",
logo:"https://upload.wikimedia.org/wikipedia/commons/6/6e/Spinz_logo.png",
bonus:"Bonus bis 300€",
link:"#"

{
name:"Caxino",
logo:"https://upload.wikimedia.org/wikipedia/commons/0/02/Caxino_logo.png",
bonus:"Bonus bis 400€",
link:"#"
},

{
name:"Chipz",
logo:"https://upload.wikimedia.org/wikipedia/commons/3/3c/Chipz_logo.png",
bonus:"Bonus bis 300€",
link:"#"

{
name:"N1 Casino",

];

function render(){

const container=document.getElementById("cards");

container.innerHTML=casinos.map(casino=>`

<div class="card">

<div class="brand">

<div class="logo-box">
<img src="${casino.logo}">
</div>

<div>
<div class="casino-name">${casino.name}</div>
<div>${casino.bonus}</div>
</div>

</div>

<div>
<a class="btn" href="${casino.link}" target="_blank" rel="nofollow sponsored">Jetzt spielen</a>
</div>

`).join("");

}

render();

</script>

</body>
</html>
